<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Moharani ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#ff4d6d,#ff85a2,#ffb3c6,#ffd6e0,#ff758f);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
z-index:5;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{
opacity:0;
transform:scale(.4);
}
100%{
opacity:1;
transform:scale(1);
}
}

h1{

font-size:65px;
color:#fff;
text-shadow:
0 0 10px #fff,
0 0 20px #ff66aa,
0 0 40px #ff1493;
white-space:nowrap;
overflow:hidden;
border-right:5px solid white;
width:0;
animation:typing 5s steps(24,end) forwards,
blink .8s infinite;

}

@keyframes typing{
from{width:0;}
to{width:100%;}
}

@keyframes blink{
50%{border-color:transparent;}
}

h2{

margin-top:30px;
font-size:40px;
color:#fff8dc;
opacity:0;
animation:show 2s ease forwards;
animation-delay:5.3s;

text-shadow:
0 0 10px white,
0 0 20px gold;

}

@keyframes show{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.heart{

font-size:90px;
margin-top:30px;
animation:heart 1s infinite;

}

@keyframes heart{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.35) rotate(-5deg);
}

}

.hearts span{

position:absolute;
bottom:-100px;
color:white;
animation:float linear infinite;

}

@keyframes float{

0%{
transform:translateY(0) scale(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}

}

.stars{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;

}

.star{

position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;

}

@keyframes twinkle{

from{
opacity:.2;
transform:scale(.5);
}

to{
opacity:1;
transform:scale(2);
}

}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>I Love You My Moharani ❤️</h1>

<h2>Kuttir Bacca 🥺💖</h2>

<div class="heart">💖</div>

</div>

<script>

const hearts=document.getElementById("hearts");

for(let i=0;i<80;i++){

let h=document.createElement("span");

h.innerHTML=Math.random()>0.5?"💖":"❤️";

h.style.left=Math.random()*100+"%";

h.style.fontSize=(15+Math.random()*40)+"px";

h.style.animationDuration=(4+Math.random()*6)+"s";

h.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(h);

}

const stars=document.getElementById("stars");

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*2+"s";

stars.appendChild(s);

}

</script>

</body>
</html>
